<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Jewish Diaspora — A Population History</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>The Jewish Diaspora</h1>
      <p class="subtitle">Population distribution from 1 CE to 2020</p>
    </header>

    <div id="map-container">
      <svg id="map"></svg>
      <div id="tooltip" class="tooltip"></div>
    </div>

    <div id="timeline-container">
      <div id="year-display">
        <span id="current-year">1 CE</span>
        <span id="total-population"></span>
      </div>
      <div id="slider-wrapper">
        <div id="event-markers"></div>
        <input type="range" id="year-slider" min="0" max="1000" value="0">
      </div>
      <div id="event-display"></div>
    </div>
  </div>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal-content">
      <button class="modal-close">&times;</button>
      <h2 id="modal-title"></h2>
      <svg id="modal-map"></svg>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
